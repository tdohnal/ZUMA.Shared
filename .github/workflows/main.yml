name: Publish Shared Kernel and Analyzer to GitHub Packages

on:
  push:
    branches: [ master ]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x' # .NET 10 pro Shared Kernel a build
          source-url: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Version String
        id: version_gen
        run: |
          DATE=$(date +'%Y.%m.%d')
          VERSION="${DATE}.${{ github.run_number }}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      # --- SHARED KERNEL (.NET 10) ---
      - name: Restore Shared Kernel
        run: dotnet restore ZUMA.SharedKernel/ZUMA.SharedKernel.csproj

      - name: Build Shared Kernel
        run: dotnet build ZUMA.SharedKernel/ZUMA.SharedKernel.csproj --configuration Release --no-restore /p:Version=${{ steps.version_gen.outputs.VERSION }}

      - name: Pack Shared Kernel
        run: dotnet pack ZUMA.SharedKernel/ZUMA.SharedKernel.csproj --configuration Release --no-build --output ./dist /p:Version=${{ steps.version_gen.outputs.VERSION }}

      # --- ARCHITECTURE ANALYZER (netstandard2.0) ---
      - name: Restore Analyzer
        run: dotnet restore ZUMA.ArchitectureAnalyzer/ZUMA.ArchitectureAnalyzer.csproj

      - name: Build Analyzer
        run: dotnet build ZUMA.ArchitectureAnalyzer/ZUMA.ArchitectureAnalyzer.csproj --configuration Release --no-restore /p:Version=${{ steps.version_gen.outputs.VERSION }}

      - name: Pack Analyzer
        run: dotnet pack ZUMA.ArchitectureAnalyzer/ZUMA.ArchitectureAnalyzer.csproj --configuration Release --no-build --output ./dist /p:Version=${{ steps.version_gen.outputs.VERSION }}

      # --- PUSH VŠEHO ---
      - name: Push to GitHub Feed
        run: dotnet nuget push "./dist/*.nupkg" --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate
