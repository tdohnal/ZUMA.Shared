name: Publish Shared Kernel to GitHub Packages

on:
  push:
    branches: [ master ] # Ujisti se, že tvoje větev je master

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          source-url: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore
        run: dotnet restore ZUMA.SharedKernel/ZUMA.SharedKernel.csproj

      # KROK 1: Sestavení projektu (vytvoří potřebné soubory na disku)
      - name: Build
        run: dotnet build ZUMA.SharedKernel/ZUMA.SharedKernel.csproj --configuration Release --no-restore

      # KROK 2: Zaballení do .nupkg (použije soubory z buildu)
      - name: Pack
        run: dotnet pack ZUMA.SharedKernel/ZUMA.SharedKernel.csproj --configuration Release --no-build --output ./dist

      # KROK 3: Odeslání do GitHub Feedu
      - name: Push to GitHub Feed
        run: dotnet nuget push ./dist/*.nupkg --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" --skip-duplicate
